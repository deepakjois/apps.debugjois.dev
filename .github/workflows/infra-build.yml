name: Infra Build

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-build.yml'
      - '.github/actions/infra-lint-build/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      # Node 22 ships npm 10, but our lockfiles were generated with npm 11.
      # Match the local npm version so `npm ci` accepts the lockfile as-is.
      - name: Pin npm version
        run: npm install -g npm@11

      - name: Build and synth infra
        uses: ./.github/actions/infra-lint-build
