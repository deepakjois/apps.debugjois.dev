name: Infra Build

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-build.yml'
      - '.github/actions/infra-lint-build/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Build and synth infra
        uses: ./.github/actions/infra-lint-build
