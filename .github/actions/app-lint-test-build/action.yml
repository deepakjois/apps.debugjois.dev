name: App Lint, Test, and Build
description: Run formatting, linting, tests, and build for the app (checkout and Node setup must happen before calling this action)

inputs:
  install:
    description: Whether to run npm ci
    default: 'true'
  build:
    description: Whether to run the build step
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      working-directory: app
      run: npm ci

    - name: Check formatting
      shell: bash
      working-directory: app
      run: npm run format:check

    - name: Run lint
      shell: bash
      working-directory: app
      run: npm run lint

    - name: Run tests
      shell: bash
      working-directory: app
      run: npm test

    - name: Build app
      if: inputs.build == 'true'
      shell: bash
      working-directory: app
      run: npm run build
